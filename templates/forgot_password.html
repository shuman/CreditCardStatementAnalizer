{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <div class="mx-auto w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg mb-4">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-900">Forgot password?</h2>
            <p class="mt-2 text-sm text-gray-600">Enter your email and we'll send you a reset link</p>
        </div>

        <!-- Success message -->
        <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm">
            <i class="fas fa-check-circle mr-2"></i>
            <span id="success-text"></span>
        </div>

        <!-- Error message -->
        <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="error-text"></span>
        </div>

        <!-- Reset Request Form -->
        <form id="reset-request-form" class="mt-8 space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input id="email" name="email" type="email" autocomplete="email" required
                    class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                    placeholder="you@example.com">
            </div>

            <div>
                <button type="submit" id="reset-btn"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    <span id="reset-btn-text">Send reset link</span>
                    <span id="reset-btn-spinner" class="hidden ml-2">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                </button>
            </div>
        </form>

        <!-- Back to Login -->
        <div class="text-center">
            <a href="/login" class="text-sm font-medium text-indigo-600 hover:text-indigo-500 inline-flex items-center gap-2">
                <i class="fas fa-arrow-left"></i>
                Back to sign in
            </a>
        </div>
    </div>
</div>

<script>
document.getElementById('reset-request-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const resetBtn = document.getElementById('reset-btn');
    const resetBtnText = document.getElementById('reset-btn-text');
    const resetBtnSpinner = document.getElementById('reset-btn-spinner');
    const errorMessage = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const successMessage = document.getElementById('success-message');
    const successText = document.getElementById('success-text');

    // Hide messages
    errorMessage.classList.add('hidden');
    successMessage.classList.add('hidden');

    // Show loading state
    resetBtn.disabled = true;
    resetBtnText.textContent = 'Sending...';
    resetBtnSpinner.classList.remove('hidden');

    try {
        const response = await fetch('/api/auth/request-password-reset', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email }),
        });

        const data = await response.json();

        if (response.ok) {
            // Success
            successText.textContent = data.message || 'If the email exists, a password reset link has been sent.';
            successMessage.classList.remove('hidden');

            // Clear form
            document.getElementById('reset-request-form').reset();
        } else {
            // Error
            errorText.textContent = data.detail || 'Failed to send reset link';
            errorMessage.classList.remove('hidden');
        }
    } catch (error) {
        errorText.textContent = 'Network error. Please try again.';
        errorMessage.classList.remove('hidden');
    } finally {
        // Reset button state
        resetBtn.disabled = false;
        resetBtnText.textContent = 'Send reset link';
        resetBtnSpinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
