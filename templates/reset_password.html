{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <div class="mx-auto w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg mb-4">
                <i class="fas fa-lock text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-900">Reset your password</h2>
            <p class="mt-2 text-sm text-gray-600">Enter a new password for your account</p>
        </div>

        <!-- Error message -->
        <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="error-text"></span>
        </div>

        <!-- Reset Password Form -->
        <form id="reset-password-form" class="mt-8 space-y-6">
            <div class="space-y-4">
                <div>
                    <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
                    <input id="new-password" name="new-password" type="password" required minlength="8"
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                    <p class="mt-1 text-xs text-gray-500">Minimum 8 characters</p>
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm new password</label>
                    <input id="confirm-password" name="confirm-password" type="password" required minlength="8"
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <div>
                <button type="submit" id="reset-btn"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    <span id="reset-btn-text">Reset password</span>
                    <span id="reset-btn-spinner" class="hidden ml-2">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

// Check if token exists
if (!token) {
    const errorMessage = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    errorText.textContent = 'Invalid reset link. Please request a new password reset.';
    errorMessage.classList.remove('hidden');
    document.getElementById('reset-password-form').remove();
}

document.getElementById('reset-password-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();

    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    const resetBtn = document.getElementById('reset-btn');
    const resetBtnText = document.getElementById('reset-btn-text');
    const resetBtnSpinner = document.getElementById('reset-btn-spinner');
    const errorMessage = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');

    errorMessage.classList.add('hidden');

    // Validate passwords match
    if (newPassword !== confirmPassword) {
        errorText.textContent = 'Passwords do not match';
        errorMessage.classList.remove('hidden');
        return;
    }

    // Show loading state
    resetBtn.disabled = true;
    resetBtnText.textContent = 'Resetting password...';
    resetBtnSpinner.classList.remove('hidden');

    try {
        const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                token: token,
                new_password: newPassword
            }),
        });

        const data = await response.json();

        if (response.ok) {
            // Success - redirect to login with success message
            window.location.href = '/login?reset=success';
        } else {
            // Error
            errorText.textContent = data.detail || 'Failed to reset password. The link may have expired.';
            errorMessage.classList.remove('hidden');
        }
    } catch (error) {
        errorText.textContent = 'Network error. Please try again.';
        errorMessage.classList.remove('hidden');
    } finally {
        // Reset button state
        resetBtn.disabled = false;
        resetBtnText.textContent = 'Reset password';
        resetBtnSpinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
